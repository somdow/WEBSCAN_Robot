# A/B Test Plan Workflow
name: ab-test-plan
description: "Design rigorous A/B tests with proper hypothesis, sample size, and analysis plan"
author: "Dana"

config_source: "{project-root}/.bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
