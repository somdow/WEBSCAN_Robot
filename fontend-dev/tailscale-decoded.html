<style>
  :root{
    --ink:#1a1a1a;
    --ink-2:#3d3d3d;
    --muted:#8a8a8a;
    --line:#1a1a1a;
    --line-2:#c9c9c9;
    --paper:#f5f2eb;
    --paper-2:#efece4;
    --card:#ffffff;
    --accent:#ef5a24; /* Webscan orange */
    --accent-soft:#ffe2d4;
    --green:#1d7f3f;
    --green-soft:#cfe9d7;
    --red:#b83227;
    --red-soft:#f7d6d2;
    --yellow:#d4a017;
    --yellow-soft:#fbeec6;
    --blue:#2f5fa8;
    --blue-soft:#d7e1f2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;}
  body{min-width:1440px}

  /* Tab bar */
  .tabs{
    position:sticky; top:0; z-index:50;
    background:var(--paper);
    border-bottom:1.5px solid var(--line);
    padding:14px 28px 12px;
    display:flex; align-items:center; gap:18px;
  }
  .tabs .brand{
    font-family:'Caveat',cursive; font-weight:700; font-size:26px; letter-spacing:.5px;
    padding-right:18px; border-right:1.5px solid var(--line);
  }
  .tabs .brand small{font-family:'Inter'; font-weight:500; font-size:12px; color:var(--muted); display:block; line-height:1; margin-top:2px}
  .tabs .row{display:flex; gap:10px; flex-wrap:wrap}
  .tab{
    font-family:'Inter'; font-weight:600; font-size:13px;
    border:1.5px solid var(--line);
    background:var(--card); color:var(--ink);
    padding:8px 14px 8px 12px; border-radius:10px;
    cursor:pointer; display:flex; align-items:center; gap:8px;
    box-shadow:2px 2px 0 var(--line);
    transition:transform .08s ease;
  }
  .tab:hover{transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--line)}
  .tab .num{
    font-family:'Caveat'; font-weight:700; font-size:18px; line-height:1;
    width:22px; height:22px; display:grid; place-items:center;
    background:var(--paper-2); border:1.2px solid var(--line); border-radius:6px;
  }
  .tab.active{background:var(--ink); color:#fff}
  .tab.active .num{background:var(--accent); color:#fff; border-color:var(--ink)}

  .tabs .meta{margin-left:auto; font-family:'Caveat'; font-size:20px; color:var(--ink-2); font-weight:600}
  .tabs .meta b{color:var(--accent)}

  /* Frame shell */
  .frame{ padding:28px 28px 80px; display:none }
  .frame.active{display:block}
  .frame.active{display:block}

  .frame-head{
    display:flex; align-items:flex-end; justify-content:space-between;
    margin:4px 0 18px;
  }
  .frame-head h2{
    font-family:'Caveat',cursive; font-weight:700; font-size:40px; margin:0;
    letter-spacing:.3px;
  }
  .frame-head h2 em{font-style:normal; color:var(--accent)}
  .frame-head .note{
    font-family:'Caveat',cursive; font-size:20px; color:var(--ink-2);
    max-width:640px; text-align:right; line-height:1.25;
  }

  /* Browser chrome around each wireframe */
  .browser{
    border:1.5px solid var(--line);
    border-radius:14px;
    background:var(--card);
    box-shadow:6px 6px 0 var(--line);
    overflow:hidden;
  }
  .browser .chrome{
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-bottom:1.5px solid var(--line);
    background:var(--paper-2);
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);
  }
  .browser .chrome .dots{display:flex; gap:6px}
  .browser .chrome .dots span{width:11px; height:11px; border-radius:50%; border:1.2px solid var(--line); background:#fff}
  .browser .chrome .url{
    flex:1; margin:0 12px; padding:4px 10px;
    border:1.2px solid var(--line); border-radius:6px; background:#fff;
    text-align:center; color:var(--ink-2);
  }

  /* Annotations */
  .anno{
    font-family:'Caveat',cursive; font-weight:600; font-size:18px; color:var(--accent);
    position:absolute; white-space:nowrap; pointer-events:none;
  }
  .anno::before{content:"↳ "; color:var(--accent)}
  .anno.above::before{content:"↑ "}
  .anno.plain::before{content:""}

  /* Shared sketchy primitives */
  .sk-box{ border:1.5px solid var(--line); border-radius:10px; background:#fff }
  .sk-box.dashed{ border-style:dashed; border-color:var(--line-2); background:transparent }
  .sk-line{ height:1.5px; background:var(--line); border-radius:2px }
  .sk-line.soft{ background:var(--line-2); height:1.2px }
  .sk-txt{ height:10px; background:var(--line-2); border-radius:4px }
  .sk-txt.dark{ background:var(--ink) }
  .sk-txt.short{ width:40% }
  .sk-txt.mid{ width:65% }
  .sk-btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 16px; border:1.5px solid var(--line); border-radius:10px;
    background:#fff; font-weight:700; font-size:13px; box-shadow:2px 2px 0 var(--line);
  }
  .sk-btn.primary{ background:var(--ink); color:#fff }
  .sk-btn.accent{ background:var(--accent); color:#fff; border-color:var(--ink) }
  .sk-pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border:1.2px solid var(--line); border-radius:999px;
    font-size:11px; font-weight:600; background:#fff;
  }
  .sk-pill.pass{ background:var(--green-soft); color:var(--green); border-color:var(--green) }
  .sk-pill.fail{ background:var(--red-soft); color:var(--red); border-color:var(--red) }
  .sk-pill.warn{ background:var(--yellow-soft); color:#8a6a10; border-color:var(--yellow) }
  .sk-pill.info{ background:var(--blue-soft); color:var(--blue); border-color:var(--blue) }

  .hand{ font-family:'Caveat',cursive; font-weight:600; }

  /* Top navbar mock (inside browser) */
  .mock-nav{
    display:flex; align-items:center; gap:22px;
    padding:16px 28px; border-bottom:1px solid var(--line-2);
  }
  .mock-nav .logo{ font-family:'Caveat'; font-weight:700; font-size:22px }
  .mock-nav .logo::before{ content:"W"; display:inline-grid; place-items:center; width:22px; height:22px; background:var(--accent); color:#fff; font-family:'Inter'; font-weight:800; font-size:13px; border-radius:5px; margin-right:8px; vertical-align:-2px }
  .mock-nav .links{ display:flex; gap:18px; font-size:13px; font-weight:500; color:var(--ink-2) }
  .mock-nav .spacer{ flex:1 }
  .mock-nav .auth{ display:flex; gap:10px; align-items:center }

  /* Footer mock */
  .mock-foot{
    padding:36px 28px 28px; border-top:1px solid var(--line-2);
    display:grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap:28px;
    font-size:12px; color:var(--muted);
  }
  .mock-foot h5{ font-family:'Inter'; font-weight:700; font-size:12px; color:var(--ink); margin:0 0 10px; text-transform:uppercase; letter-spacing:.08em }
  .mock-foot ul{ list-style:none; padding:0; margin:0; display:grid; gap:6px }

  /* scan result mini rows */
  .row-result{
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; border:1.2px solid var(--line-2); border-radius:8px;
    background:#fff;
  }
  .row-result .dot{ width:10px; height:10px; border-radius:50%; background:var(--line-2) }
  .row-result.pass .dot{ background:var(--green) }
  .row-result.fail .dot{ background:var(--red) }
  .row-result.warn .dot{ background:var(--yellow) }

  /* misc */
  .stamp{
    display:inline-block; border:1.5px dashed var(--accent); color:var(--accent);
    padding:3px 8px; border-radius:6px; font-family:'Caveat'; font-weight:700; font-size:16px;
    transform:rotate(-3deg);
  }
  .legend{
    display:flex; gap:18px; flex-wrap:wrap; align-items:center;
    font-family:'Caveat'; font-size:17px; color:var(--ink-2);
    border:1.5px dashed var(--line-2); padding:10px 14px; border-radius:10px;
    margin:0 0 18px; background:var(--paper-2);
  }
  .legend b{color:var(--ink)}
  .legend .swatch{ display:inline-block; width:12px; height:12px; border-radius:3px; border:1px solid var(--line); vertical-align:-1px; margin-right:4px }
</style>

</head>
