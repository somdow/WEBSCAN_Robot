[phases.setup]
nixPkgs = ["php84", "php84Extensions.intl", "php84Extensions.bcmath", "php84Extensions.zip", "php84Extensions.pdo_mysql", "php84Extensions.gd", "php84Extensions.curl", "php84Extensions.mbstring", "php84Extensions.dom", "php84Extensions.xml", "php84Extensions.opcache", "nodejs_22"]

[phases.build]
cmds = [
    "cp .env.example .env || true",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan key:generate --force && php artisan migrate --force && php artisan db:seed --force && php artisan storage:link 2>/dev/null; php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
